# Opens release/v* from main: bumps version (conventional commits or explicit bump), regenerates CHANGELOG, opens PR.
name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

concurrency:
  group: release-prepare
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure baseline v* tag for git-cliff
        run: |
          set -euo pipefail
          if git describe --tags --abbrev=0 --match 'v*' >/dev/null 2>&1; then
            echo "Using existing tag: $(git describe --tags --abbrev=0 --match 'v*')"
            exit 0
          fi

          VER="$(awk -F '"' '/^version = / {print $2; exit}' Cargo.toml)"
          BASE="$(git log -1 --format=%H -S "version = \"${VER}\"" -- Cargo.toml || true)"
          if [ -z "$BASE" ]; then
            echo "::error::No v* tags and no commit introducing version=${VER} in Cargo.toml (git log -S). Add a baseline tag, e.g. git tag v${VER} <commit> && git push origin v${VER}"
            exit 1
          fi

          TAG="v${VER}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists at $(git rev-parse "$TAG")"
          else
            git tag "$TAG" "$BASE"
            echo "::notice::Created baseline tag ${TAG} at ${BASE} (introduces version ${VER} in Cargo.toml)."
          fi

          git push origin "refs/tags/${TAG}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Compute next version and change log
        id: rel
        run: |
          set -euo pipefail
          BUMP="${{ inputs.bump }}"
          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v*')"

          if [ "$BUMP" = "auto" ]; then
            NEXT_TAG="$(git cliff --bumped-version)"
            if [ "$NEXT_TAG" = "$LAST_TAG" ]; then
              echo "::error::No semantic version change from conventional commits since ${LAST_TAG}. Add feat/fix/breaking commits or run again with patch/minor/major."
              exit 1
            fi
            git cliff -o CHANGELOG.md --bump
          else
            NEXT_TAG="$(git cliff --bumped-version --bump "$BUMP")"
            git cliff -o CHANGELOG.md --bump "$BUMP"
          fi

          VERSION_NUM="${NEXT_TAG#v}"
          echo "version_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_num=${VERSION_NUM}" >> "$GITHUB_OUTPUT"
          echo "branch=release/${NEXT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Sync Cargo.toml version
        run: cargo set-version "${{ steps.rel.outputs.version_num }}"

      - name: Refresh Cargo.lock
        run: cargo check -p sprinter

      - name: Commit and push release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Explicit HTTPS auth (more reliable than persisted credentials for some org defaults).
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          BRANCH="${{ steps.rel.outputs.branch }}"
          if git ls-remote --heads origin "refs/heads/${BRANCH}" | grep -q .; then
            echo "::error::Branch $BRANCH already exists on origin; delete or merge it first."
            exit 1
          fi

          git status --short
          git checkout -b "$BRANCH"
          git add CHANGELOG.md Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "::error::Nothing to commit (CHANGELOG / Cargo.toml / Cargo.lock unchanged). Check git-cliff and cargo set-version steps."
            exit 1
          fi
          git commit -m "chore(release): ${{ steps.rel.outputs.version_tag }}"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.rel.outputs.branch }}"
          OPEN="$(gh pr list --head "$BRANCH" --base "${DEFAULT_BRANCH}" --state open --json number --jq 'length')"
          if [ "$OPEN" != "0" ]; then
            echo "Open PR already exists for $BRANCH → ${DEFAULT_BRANCH}"
            exit 0
          fi
          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${DEFAULT_BRANCH}" \
            --head "$BRANCH" \
            --title "release: ${{ steps.rel.outputs.version_tag }}" \
            --body "Automated release branch. **Merge this PR to ${DEFAULT_BRANCH}** to create GitHub tag + GitHub Release (\`release-finalize.yml\`). Then run **Deploy (crates.io)** to publish if needed." \
            || {
              echo "::error::gh pr create failed. Enable **Workflow permissions → Read and write** and **Allow GitHub Actions to create and approve pull requests** (repo Settings → Actions → General). See sprinter-workflow skill."
              exit 1
            }
